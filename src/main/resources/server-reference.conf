# Server reference configuration for Mihon gRPC Service
# Minimal config to satisfy AndroidCompat initialization

server {
  # Debug logging
  debugLogsEnabled = false

  # Features not needed in gRPC service
  systemTrayEnabled = false
  initialOpenInBrowserEnabled = false

  # Network proxy configuration
  network {
    proxyEnabled = false
    proxyType = "HTTP"       # HTTP or SOCKS
    proxyHost = ""
    proxyPort = 0
    proxyUsername = ""
    proxyPassword = ""
    rateLimitMultiplier = 1  # Multiplier for source rate limits when proxy is enabled (1 = no change)
  }
}
